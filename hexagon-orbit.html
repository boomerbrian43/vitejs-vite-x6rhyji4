<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Hexagon Orbit</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #000; overflow: hidden;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    color: #fff; user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  #game { display: block; width: 100vw; height: 100vh; cursor: pointer; }
  .hud {
    position: fixed; top: 18px; left: 20px; pointer-events: none;
    text-shadow: 0 0 10px currentColor;
    letter-spacing: 2px;
  }
  .hud .score {
    color: #00f6ff; font-size: clamp(26px, 4.2vw, 44px); font-weight: 700;
    line-height: 1;
  }
  .hud .high {
    color: #ff4fcf; font-size: clamp(12px, 1.6vw, 16px); margin-top: 6px;
    opacity: 0.9;
  }
  .hint {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    color: #9a9aff; opacity: 0.65; font-size: clamp(11px, 1.4vw, 14px);
    letter-spacing: 3px; text-transform: uppercase; pointer-events: none;
    text-shadow: 0 0 8px #9a9aff55;
  }
  .flash {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(circle at center, #ff004455 0%, #ff004400 70%);
    opacity: 0; transition: opacity 90ms ease-out;
  }
  .flash.on { opacity: 1; transition: opacity 0ms; }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="score" id="score">0</div>
    <div class="high" id="high">BEST 0</div>
  </div>
  <div class="hint" id="hint">Tap / Click to reverse orbit</div>
  <div class="flash" id="flash"></div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highEl = document.getElementById('high');
  const hintEl = document.getElementById('hint');
  const flashEl = document.getElementById('flash');

  let W = 0, H = 0, cx = 0, cy = 0, dpr = 1;
  const TAU = Math.PI * 2;
  const SQRT3 = Math.sqrt(3);

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  const HIGH_KEY = 'hexagonOrbitHighScore.v1';

  const playerOrbitRadius = () => Math.max(70, Math.min(W, H) * 0.13);
  const ringMaxRadius     = () => Math.hypot(W, H) * 0.55 + 60;
  const ringSpacing       = () => Math.max(110, Math.min(W, H) * 0.14);
  const playerRadius      = () => Math.max(7, Math.min(W, H) * 0.017);

  const state = {
    player: { angle: -Math.PI / 2, dir: 1, baseSpeed: 2.0 },
    rings: [],
    particles: [],
    score: 0,
    high: +(localStorage.getItem(HIGH_KEY) || 0),
    ringBaseSpeed: 140,
    started: false,
    dead: false,
    deadTimer: 0,
  };

  function speedMul() {
    // Addictive ramp: scales with score, soft-capped.
    return 1 + Math.min(2.2, state.score * 0.022);
  }

  function makeRing(radius) {
    const gapCount = Math.random() < 0.28 ? 2 : 1;
    const sides = [true, true, true, true, true, true];
    const pool = [0, 1, 2, 3, 4, 5];
    for (let i = 0; i < gapCount; i++) {
      const j = Math.floor(Math.random() * pool.length);
      sides[pool[j]] = false;
      pool.splice(j, 1);
    }
    const rotation = Math.floor(Math.random() * 6) * (Math.PI / 3) + Math.random() * 0.15;
    const hue = (Math.random() * 360) | 0;
    return { radius, sides, rotation, hue, counted: false };
  }

  function populateInitialRings() {
    state.rings.length = 0;
    const spacing = ringSpacing();
    const start = ringMaxRadius();
    const end = playerOrbitRadius() + spacing * 1.1;
    for (let r = start; r > end; r -= spacing) {
      state.rings.push(makeRing(r));
    }
  }

  function reset() {
    if (state.score > state.high) {
      state.high = state.score;
      localStorage.setItem(HIGH_KEY, String(state.high));
    }
    state.score = 0;
    state.player.angle = -Math.PI / 2;
    state.player.dir = 1;
    state.particles.length = 0;
    populateInitialRings();
    updateHUD();
  }

  function updateHUD() {
    scoreEl.textContent = state.score;
    highEl.textContent = 'BEST ' + state.high;
  }

  reset();

  function triggerDeath() {
    const pR = playerOrbitRadius();
    const px = cx + pR * Math.cos(state.player.angle);
    const py = cy + pR * Math.sin(state.player.angle);
    for (let i = 0; i < 28; i++) {
      const a = Math.random() * TAU;
      const s = 120 + Math.random() * 260;
      state.particles.push({
        x: px, y: py,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 0.55 + Math.random() * 0.35,
        age: 0,
        hue: 340 + Math.random() * 30,
      });
    }
    flashEl.classList.add('on');
    setTimeout(() => flashEl.classList.remove('on'), 120);
    state.dead = true;
    state.deadTimer = 0.55;
  }

  function onTap() {
    if (!state.started) {
      state.started = true;
      hintEl.style.opacity = '0';
    }
    if (state.dead) return;
    state.player.dir *= -1;
  }

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    onTap();
  });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown' ||
        e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'Enter') {
      e.preventDefault();
      onTap();
    }
  });

  function checkCollisionAndScore(dt) {
    const pR = playerOrbitRadius();
    const pr = playerRadius();
    const tolerance = pr + 3;
    const rawAngle = state.player.angle;
    for (const ring of state.rings) {
      // Angle of player in ring's local frame (account for rotation).
      let local = rawAngle - ring.rotation;
      local = ((local % TAU) + TAU) % TAU;
      const sideIdx = Math.floor(local / (Math.PI / 3)) % 6;
      const midAngle = (sideIdx + 0.5) * (Math.PI / 3);
      const apothem = ring.radius * SQRT3 / 2;
      const edgeDist = apothem / Math.cos(local - midAngle);

      if (Math.abs(edgeDist - pR) < tolerance && ring.sides[sideIdx]) {
        if (!state.dead) triggerDeath();
        return;
      }

      // Score when fully past the player orbit (inner vertex distance < pR).
      if (!ring.counted && ring.radius < pR - pr * 1.1) {
        ring.counted = true;
        state.score++;
        updateHUD();
      }
    }
  }

  let lastT = performance.now();
  function frame(t) {
    const dt = Math.min(0.033, (t - lastT) / 1000);
    lastT = t;

    const mul = speedMul();

    if (!state.dead) {
      // Player motion only after first tap (so players read the screen).
      if (state.started) {
        state.player.angle += state.player.dir * state.player.baseSpeed * mul * dt;
      }

      // Rings shrink (only after start).
      if (state.started) {
        for (const r of state.rings) {
          r.radius -= state.ringBaseSpeed * mul * dt;
        }
      }

      // Spawn new rings to keep the field full.
      const spacing = ringSpacing();
      const maxR = ringMaxRadius();
      const outermost = state.rings.length
        ? Math.max(...state.rings.map(r => r.radius))
        : -Infinity;
      if (outermost < maxR - spacing) {
        state.rings.push(makeRing(maxR));
      }

      // Cull rings that have fully collapsed.
      state.rings = state.rings.filter(r => r.radius > 10);

      checkCollisionAndScore(dt);
    } else {
      state.deadTimer -= dt;
      if (state.deadTimer <= 0) {
        state.dead = false;
        state.started = false;
        hintEl.style.opacity = '0.65';
        reset();
      }
    }

    // Particles
    for (const p of state.particles) {
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.92;
      p.vy *= 0.92;
    }
    state.particles = state.particles.filter(p => p.age < p.life);

    render();
    requestAnimationFrame(frame);
  }

  function drawRing(ring) {
    const R = ring.radius;
    if (R <= 2) return;
    const color = `hsl(${ring.hue}, 100%, 60%)`;
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 18;
    ctx.lineWidth = Math.max(3, Math.min(6, R * 0.018));
    ctx.lineCap = 'round';

    for (let i = 0; i < 6; i++) {
      if (!ring.sides[i]) continue;
      const a1 = ring.rotation + i * Math.PI / 3;
      const a2 = ring.rotation + (i + 1) * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(R * Math.cos(a1), R * Math.sin(a1));
      ctx.lineTo(R * Math.cos(a2), R * Math.sin(a2));
      ctx.stroke();
    }
  }

  function render() {
    // Subtle trailing fade for motion blur vibe.
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.translate(cx, cy);

    // Player orbit ghost circle.
    const pR = playerOrbitRadius();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = 'rgba(120, 180, 255, 0.08)';
    ctx.lineWidth = 1;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(0, 0, pR, 0, TAU);
    ctx.stroke();

    // Rings.
    for (const ring of state.rings) drawRing(ring);

    // Center core.
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#7cffff';
    ctx.fillStyle = '#7cffff';
    ctx.beginPath();
    ctx.arc(0, 0, Math.max(3, pR * 0.04), 0, TAU);
    ctx.fill();

    // Player.
    if (!state.dead) {
      const px = pR * Math.cos(state.player.angle);
      const py = pR * Math.sin(state.player.angle);
      const prad = playerRadius();
      ctx.shadowBlur = 28;
      ctx.shadowColor = '#ff4fcf';
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(px, py, prad * 0.55, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#ff4fcf';
      ctx.beginPath();
      ctx.arc(px, py, prad, 0, TAU);
      ctx.globalAlpha = 0.55;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    // Particles.
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of state.particles) {
      const t = 1 - p.age / p.life;
      const size = 2 + 3 * t;
      ctx.shadowBlur = 16;
      ctx.shadowColor = `hsl(${p.hue}, 100%, 60%)`;
      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${t})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size, 0, TAU);
      ctx.fill();
    }
    ctx.restore();

    ctx.globalCompositeOperation = 'source-over';
    ctx.shadowBlur = 0;
  }

  requestAnimationFrame((t) => { lastT = t; frame(t); });
})();
</script>
</body>
</html>
